name: Sync feeds

on:
  schedule:
    # mensual — día 1, 06:00 UTC
    - cron: "0 6 1 * *"
    # bisemanal opt-in (descomenta si quieres ejecutar también el día 15)
    # - cron: "0 6 15 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run feed builder
        run: node feeds/build.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "feeds-bot"
          git config user.email "feeds-bot@users.noreply.github.com"
          git add data/ assets/log/ assets/newsletter/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "feeds: sync $(date -u +%Y-%m-%d)"
            git push
          fi
